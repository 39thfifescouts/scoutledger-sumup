name = "sumup-xero-reconcile"
main = "src/worker.ts"
compatibility_date = "2024-08-15"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "sumup-webhook.scoutledger.dev"
custom_domain = true

[observability.logs]
enabled = true
invocation_logs = true

[[kv_namespaces]]
binding = "XERO_TOKENS"
id = "e44c037b2c8d498ea1a78c37b3cda113"

[vars]
NOTIFY_FROM = "onboarding@resend.dev"
# Xero account codes (the number shown in Chart of Accounts, not the name):
XERO_ACCOUNT_CARD_SALES = "200"
XERO_ACCOUNT_FEES = "404"
# Xero tracking category names (must match exactly what's in Xero):
XERO_TRACKING_FUND_TYPE = "Fund Type"
XERO_TRACKING_GROUP_ACTIVITIES = "Group Activities"
# Secrets (set via `wrangler secret put <NAME>`, never stored here):
# SUMUP_API_KEY
# SUMUP_WEBHOOK_SECRET
# NOTIFY_EMAIL
# RESEND_API_KEY
# XERO_CLIENT_ID
# XERO_CLIENT_SECRET
# XERO_TENANT_ID
# XERO_BANK_ACCOUNT_ID
